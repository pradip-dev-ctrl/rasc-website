<!DOCTYPE html>
<html>
<head>
    <title>Add Event</title>
</head>

<body>

<h2>Add New Event</h2>

<input id="title" placeholder="Event Title"><br><br>
<input id="date" placeholder="Event Date"><br><br>

<button onclick="addEvent()">Add Event</button>
<script>
async function addEvent() {
    try {
        const res = await fetch("http://127.0.0.1:5000/add-event", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: document.getElementById("title").value,
                date: document.getElementById("date").value
            })
        });

        const data = await res.json();
        alert(data.message);

    } catch (error) {
        console.error(error);
        alert("Error connecting to backend");
    }
}
</script>



</body>
</html>
