<!DOCTYPE html>
<html>
<head>
    <title>Add Podcast</title>
</head>

<body>

<h2>Add New Podcast</h2>

<input id="title" placeholder="Podcast Title"><br><br>
<input id="link" placeholder="YouTube / Spotify Link"><br><br>

<button onclick="addPodcast()">Add Podcast</button>

<script>
async function addPodcast() {
    try {
        const res = await fetch("http://127.0.0.1:5000/add-podcast", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: document.getElementById("title").value,
                link: document.getElementById("link").value
            })
        });

        const data = await res.json();
        alert(data.message);

    } catch (error) {
        alert("Error connecting backend");
    }
}
</script>

</body>
</html>
