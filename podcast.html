<!DOCTYPE html>
<html>
<head>
    <title>Podcast</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 15px auto;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        iframe {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<h2>🎙️ All Podcasts</h2>

<div id="podcastList"></div>

<script>
async function loadPodcasts() {
    try {
        const res = await fetch("http://127.0.0.1:5000/get-podcasts");
        const data = await res.json();

        let output = "";

        data.forEach(p => {
            output += `
                <div class="card">
                    <h3>${p.title}</h3>

                    <iframe width="300" height="200"
                        src="${p.link ? p.link.replace('watch?v=', 'embed/') : ''}"
                        frameborder="0" allowfullscreen>
                    </iframe>

                </div>
            `;
        });

        document.getElementById("podcastList").innerHTML = output;

    } catch (error) {
        alert("Error loading podcasts");
    }
}

loadPodcasts();
</script>

</body>
</html>
