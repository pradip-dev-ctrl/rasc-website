<!DOCTYPE html>
<html>
<head>
    <title>Debates</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 15px auto;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        iframe {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<h2>🎤 All Debates</h2>

<div id="debateList"></div>

<script>
async function loadDebates() {
    try {
        const res = await fetch("http://127.0.0.1:5000/get-debates");
        const data = await res.json();

        let output = "";

        data.forEach(d => {
            output += `
                <div class="card">
                    <h3>${d.title}</h3>
                    <p>Date: ${d.date}</p>

                    ${
                        d.video
                        ? `<iframe width="300" height="200"
                            src="${d.video.replace('watch?v=', 'embed/')}"
                            frameborder="0" allowfullscreen>
                           </iframe>`
                        : `<p>No video available</p>`
                    }

                </div>
            `;
        });

        document.getElementById("debateList").innerHTML = output;

    } catch (error) {
        console.error(error);
        alert("Error loading debates");
    }
}

loadDebates();
</script>

</body>
</html>
