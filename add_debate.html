<!DOCTYPE html>
<html>
<head>
    <title>Add Debate</title>
</head>

<body>

<h2>Add New Debate</h2>

<input id="title" placeholder="Debate Topic"><br><br>
<input id="date" placeholder="Date"><br><br>

<button onclick="addDebate()">Add Debate</button>

<script>
async function addDebate() {
    try {
        const res = await fetch("http://127.0.0.1:5000/add-debate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: document.getElementById("title").value,
                date: document.getElementById("date").value
            })
        });

        const data = await res.json();
        alert(data.message);

    } catch (error) {
        console.error(error);
        alert("Error connecting to backend");
    }
}
</script>

</body>
</html>
